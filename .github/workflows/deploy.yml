# Deploy bot ke server via SSH.
#
# Alur: SSH ke server → git pull → go build → restart proses.
#
# Secrets yang perlu diset di GitHub Repository Settings > Secrets:
#   - SSH_PRIVATE_KEY : Isi private key SSH (format OpenSSH)

name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 13.212.49.32
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/wa-gemini-bot

            echo "==> Pulling latest code..."
            git pull origin master

            echo "==> Building..."
            # Ubah nama output binary agar lebih unik
            go build -o wa-gemini-bot ./cmd/bot/

            echo "==> Stopping old process..."
            # Gunakan -x untuk exact match nama proses, bukan -f
            pkill -x 'wa-gemini-bot' || true
            sleep 2

            echo "==> Starting bot..."
            nohup ./wa-gemini-bot > bot.log 2>&1 &

            sleep 3
            # Gunakan -x di pgrep juga
            if pgrep -x 'wa-gemini-bot' > /dev/null; then
              echo "==> ✅ Bot is running! (PID: $(pgrep -x 'wa-gemini-bot'))"
            else
              echo "==> ❌ Bot failed to start. Last 20 lines of log:"
              tail -20 bot.log
              exit 1
            fi
